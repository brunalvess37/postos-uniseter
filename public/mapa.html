<style>
/* 👉 AQUI É VISUAL (CSS) */
body{display:none;}

#map{
  width:100%;
  height:calc(100vh - 140px);
  border-radius:12px;
  border:1px solid var(--border);
}

/* 📱 ajuste fino apenas para mobile */
@media (max-width: 768px){
  #map{
    height:calc(100svh - 180px);
  }
}

.search-box{max-width:520px;margin:0 auto 12px;position:relative;}

.search-wrapper {
  position: relative;
}

.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 18px;
  color: #666;
  pointer-events: none;
}

#search:focus {
  border-color: #005edb;
  box-shadow: 0 0 0 3px rgba(0, 94, 219, 0.15);
}

#search::placeholder {
  color: #777;
  font-size: 15px;
}

.clear-btn {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
  color: #999;
  display: none;
}

.clear-btn:hover {
  color: #333;
}

  
  #search{
  width:100%;
  padding:14px 44px 14px 42px;
  border-radius:12px;
  border:2px solid #003c8d;
  font-size:16px;
}
#suggestions{
  position:absolute;
  width:100%;
  background:white;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,.15);
  max-height:260px;
  overflow:auto;
  z-index:1000;
}

.map-actions{
  position:absolute;
  right:16px;
  bottom:16px;
  display:flex;
  flex-direction:column;
  gap:8px;
  z-index:1000;
}
.map-btn{
  background:white;
  border:1px solid #003c8d;
  color:#003c8d;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
}

/* ✅ BOTTOM-SHEET COM ALTURA CONTROLADA */
#rota-sheet{
  position:fixed;
  left:0;
  right:0;
  bottom:0;

  background:white;
  border-radius:16px 16px 0 0;
  box-shadow:0 -4px 12px rgba(0,0,0,.25);

  max-height:220px;          /* ← LIMITE REAL ~3 postos visíveis*/
  transform:translateY(100%);
  transition:transform .3s ease;

  z-index:600;
  display:flex;
  flex-direction:column;
}

/* aberto (expandido) */
#rota-sheet.active{
  transform:translateY(0);
}

/* minimizado (só título + handle) */
#rota-sheet.minimized{
  transform:translateY(calc(220px - 56px));
}
 

/* aberto */
#rota-sheet.active{
  transform:translateY(0);
}

.sheet-handle{
  width:40px;
  height:5px;
  background:#ccc;
  border-radius:5px;
  margin:10px auto;
}

  #rota-list{
  overflow-y: auto;
  flex: 1;
  min-height: 0;
  position: relative;

  /* Firefox */
  scrollbar-width: thin;
  scrollbar-color: #bbb transparent;
}

  /* Chrome / Edge / mobile */
#rota-list::-webkit-scrollbar{
  width: 14px; 
}


#rota-list::-webkit-scrollbar-thumb{
  background: #003c8d;   /* sua cor padrão */
  border-radius: 8px;
}


#rota-list::-webkit-scrollbar-track{
  background: #f0f0f0;
}


/* Indica que a lista continua */
#rota-list::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:24px;
  pointer-events:none;
  background:linear-gradient(
    to bottom,
    rgba(255,255,255,0),
    #fff
  );
}

  
.rota-item{
  padding:10px 44px 10px 44px; /* ← espaço à direita para o botão X */
  border-top:1px solid #eee;
  font-size:14px;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:space-between; /* empurra o X para a direita */
}


/* ===== HANDLE DE ARRASTO (☰) ===== */
.rota-handle{
  position:absolute;
  left:10px;
  top:50%;
  transform:translateY(-50%);
  font-size:18px;
  color:#003c8d;
  cursor:grab;
  padding:6px;
}

/* ===== BOTÃO REMOVER (X) ===== */
.rota-remove{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  font-size:16px;
  color:#999;
  cursor:pointer;
  padding:6px;
}

.rota-remove:hover{
  color:#d32f2f;
}

.rota-remove:active{
  color:#b71c1c;
}

  
  .rota-handle:active{
  color:#003c8d; /* ← sua cor padrão do sistema */
}


.rota-title{
  padding:10px;
  font-weight:bold;
  flex-shrink: 0; /* impede o título de empurrar o sheet */
}


/* ✨ feedback visual ao reordenar */
.rota-item.flash{
  background:#eef3ff;
  transition:background .3s ease;
}

/* ✨ efeito ao remover */
.rota-item.removing{
  opacity: 0;
  transform: translateX(20px);
  transition: opacity .25s ease, transform .25s ease;
}

/* ✨ ANIMAÇÃO AO ADICIONAR NA ROTA */
#rota-sheet.pulse{
  animation:pulseSheet .35s ease;
}

@keyframes pulseSheet{
  0%   { transform:translateY(0) scale(1); }
  50%  { transform:translateY(0) scale(1.02); }
  100% { transform:translateY(0) scale(1); }
}
  
.leaflet-popup-content{margin:0;width:260px;}
.popup-card{padding:14px;}
/* ✨ fade ao fechar popup */
.leaflet-popup.fade-out {
  opacity: 0;
  transform: translateY(10px);
  transition: opacity .25s ease, transform .25s ease;
}
.popup-title{font-weight:700;color:#003c8d;font-size:15px;margin-bottom:6px;}
.popup-address{font-size:13px;color:#444;margin-bottom:12px;}
.popup-actions{display:flex;flex-direction:column;gap:8px;}
.popup-btn{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #003c8d;
  background:#003c8d;
  color:white;
  font-size:14px;
  cursor:pointer;
}

  /* ✨ Destaque do marcador buscado (PERMANENTE E CLARO) */
.marker-highlight {
  transform: scale(1.6) !important;
  filter: drop-shadow(0 0 8px rgba(0,102,255,.9));
  border: 3px solid white !important;
  z-index: 2000 !important;
}

  /* ✨ animação ao adicionar na rota */
.marker-added {
  animation: pulseAdd 0.6s ease;
}

@keyframes pulseAdd {
  0% {
    transform: scale(1);
    box-shadow: 0 0 0 0 rgba(0,60,141,0.6);
  }
  50% {
    transform: scale(1.6);
    box-shadow: 0 0 0 10px rgba(0,60,141,0);
  }
  100% {
    transform: scale(1);
  }
}
  
  /* ===== ÍCONE DE LOCALIZAÇÃO DO USUÁRIO ===== */
.user-location-marker {
  background: #0066ff;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 2px solid white;
  box-shadow: 0 0 0 4px rgba(0,102,255,0.2);
}

/* ===== BOTÃO FLUTUANTE ⋮ ===== */
#btnMenu{
  position: fixed;
  left: 16px;
  bottom: 90px;

  width: 48px;
  height: 48px;

  border-radius: 50%;
  background: #003c8d;
  color: white;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 22px;
  cursor: pointer;

  box-shadow: 0 4px 12px rgba(0,0,0,.25);

  z-index: 550;
}

/* ===== MENU DO BOTÃO ⋮ ===== */
#menuOpcoes{
  position: fixed;
  left: 16px;
  bottom: 150px;

  display: none;
  flex-direction: column;
  gap: 6px;

  z-index: 901;

  background: white;
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 8px;
}
  
</style>

<div style="position:relative">

<div id="rota-sheet">
  <div class="sheet-handle"></div>
  <div class="rota-title" style="
  display:flex;
  justify-content:space-between;
  align-items:center;

">

  <span>Ordem da Rota</span>

  <span id="contador-rota" style="

<script>

  /* ✅ LÓGICA JAVASCRIPT */

let map; // ← torna o mapa acessível para a busca
let marcadorDestacado = null; // guarda qual pin está destacado
let marcadores = []; // guarda todos os marcadores do mapa
let searchInput;
let suggestions;
let rotaSheet;
let rotaList;
let handle;

function isCadastroInativo(p) {
  return !!p.DATA_INATIVO;
}

  async function initMapa(){

    
map = L.map("map",{zoomControl:false}).setView([-22.9,-47.06],10);

setTimeout(() => {
  map.invalidateSize();
}, 100);


// 🔹 referências globais da busca (ANTES de qualquer uso)
searchInput = document.getElementById("search");
suggestions = document.getElementById("suggestions");

rotaSheet = document.getElementById("rota-sheet");
rotaList  = document.getElementById("rota-list");
handle    = document.querySelector(".sheet-handle");

  // 📌 MENU (⋮)
const btnMenu = document.getElementById("btnMenu");
const menu = document.getElementById("menuOpcoes");

btnMenu.onclick = () => {
  const aberto = menu.style.display === "flex";
  menu.style.display = aberto ? "none" : "flex";
};

document.addEventListener("click", (e) => {
  if (!menu.contains(e.target) && !btnMenu.contains(e.target)) {
    menu.style.display = "none";
  }
});
    
// deixa a rota já "presente" em modo minimizado por padrão
rotaSheet.classList.add("active");     // 👈 torna visível
rotaSheet.classList.add("minimized");  // 👈 mantém minimizado
rotaList.style.display = "none";
atualizarContadorRota();
    
map.on("click", (e) => {
  // fecha sugestões da busca (só se já existirem)
  if (suggestions) suggestions.innerHTML = "";
  if (searchInput) searchInput.blur();



  // ❌ se clicou em um marcador, NÃO faz nada com a rota
  if (e.originalEvent.target.closest(".leaflet-marker-icon")) {
    return;
  }

//  SEMPRE limpa destaque ao clicar no mapa vazio
if (marcadorDestacado) {
  const el = marcadorDestacado.getElement();
  el?.querySelector("div")?.classList.remove("marker-highlight");
  marcadorDestacado = null;
}

// só minimiza se estiver expandido
if (rotaSheet.classList.contains("active")) {
  rotaSheet.classList.add("minimized");
  document.getElementById("rota-list").style.display = "none";
}

});

    
L.control.zoom({position:"topright"}).addTo(map);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

const postos=await fetch("/api/postos").then(r=>r.json());

// ✅ GUARDA OS POSTOS PARA USO GLOBAL (addRota)
localStorage.setItem("postos_cache", JSON.stringify(postos));

    
// ===============================
// 🔎 BUSCA (MESMO PADRÃO DO APP)
// ===============================

let activeIndex = -1;

searchInput.addEventListener("focus", () => {
  // não faz nada — sem histórico
});


searchInput.addEventListener("input", () => {
  const q = searchInput.value.toLowerCase();
  suggestions.innerHTML = "";
  activeIndex = -1;

  if (!q) {
  suggestions.innerHTML = "";
  searchInput.blur();   // ← fecha teclado no celular
  return;
}


  const lista = postos.filter(p =>
    p["POSTOS DE SERVIÇOS / GRUPO SETER"]?.toLowerCase().includes(q) ||
    p.CIDADE?.toLowerCase().includes(q) ||
    p["ENDEREÇO III"]?.toLowerCase().includes(q)
  ).slice(0, 10);

  suggestions.innerHTML = lista.map(p => {
    const i = postos.indexOf(p);

    const nome = p["POSTOS DE SERVIÇOS / GRUPO SETER"]
      ?.replace(new RegExp(q, "gi"), m => `<mark>${m}</mark>`);

    const cidade = p.CIDADE
      ?.replace(new RegExp(q, "gi"), m => `<mark>${m}</mark>`);

    const bairro = p["ENDEREÇO III"]
      ?.replace(new RegExp(q, "gi"), m => `<mark>${m}</mark>`);

    return `
      <div class="suggestion-card" data-index="${i}">
        <div class="suggestion-title">${nome}</div>
        <div class="suggestion-city">
          ${cidade}${bairro ? " — " + bairro : ""}
        </div>
      </div>
    `;
  }).join("");

  document.querySelectorAll(".suggestion-card[data-index]").forEach(card => {
  card.onclick = () => {
    const i = card.dataset.index;
    const p = postos[i];

    // Centraliza o mapa no posto escolhido
    map.setView([p.Latitude, p.Longitude], 15);

    // ✅ FECHA A JANELA DE SUGESTÕES
    suggestions.innerHTML = "";

    // (opcional) também remove o foco do campo
    searchInput.blur();

    // ===== DESTACA O MARCADOR BUSCADO (PERMANENTE) =====
const marcador = marcadores[i];
if (marcador) {

  const container = marcador.getElement();          // elemento do Leaflet
  const ponto = container?.querySelector("div");   // círculo colorido real

  if (ponto) {

    // remove destaque anterior (se houver)
    if (marcadorDestacado) {
      const antigoContainer = marcadorDestacado.getElement();
      const antigoPonto = antigoContainer?.querySelector("div");
      antigoPonto?.classList.remove("marker-highlight");
    }

    // aplica novo destaque
    ponto.classList.add("marker-highlight");
    marcadorDestacado = marcador;
  }
}
    
  }; // 👈 fecha o card.onclick
});

});

searchInput.addEventListener("keydown", e => {
  const items = document.querySelectorAll(".suggestion-card[data-index]");
  if (!items.length) return;

  if (e.key === "ArrowDown") {
    e.preventDefault();
    activeIndex = (activeIndex + 1) % items.length;
  }

  if (e.key === "ArrowUp") {
    e.preventDefault();
    activeIndex = (activeIndex - 1 + items.length) % items.length;
  }

  if (e.key === "Enter" && activeIndex >= 0) {
    e.preventDefault();
    items[activeIndex].click();
    return;
  }

  items.forEach((el, i) =>
    el.classList.toggle("active", i === activeIndex)
  );
});

    
const layerPostos=L.layerGroup().addTo(map);
const layerRota=L.layerGroup().addTo(map);
const layerUsuario = L.layerGroup().addTo(map);
    
const zonas=[...new Set(postos.map(p=>p.ZONA).filter(Boolean))];
const cores={};
zonas.forEach((z,i)=>cores[z]=`hsl(${(i*360)/zonas.length},70%,45%)`);

function iconPosto(cor){
  return L.divIcon({
    html:`<div style="background:${cor};width:12px;height:12px;border-radius:50%;border:2px solid white"></div>`
  });
}

function iconPostoInativo(){
  return L.divIcon({
    html: `
      <div style="
        background:#7a7a7a;
        width:10px;
        height:10px;
        border-radius:50%;
        border:3px solid #b71c1c;
        box-shadow: 0 0 4px rgba(0,0,0,.4);
        opacity:0.75;
      "></div>
    `
  });
}
    
function iconUsuario(){
  return L.divIcon({
    className: "user-location-marker",
    html: "<div></div>"
  });
}
    
function getRota(){
  return JSON.parse(localStorage.getItem("rota_postos")||"{\"rota\":[]}").rota;
}

function atualizarContadorRota(){

  const rota = getRota();
  const el = document.getElementById("contador-rota");

  if (!el) return;

  el.innerText = rota.length === 1
    ? "1 posto"
    : `${rota.length} postos`;
}

function salvarRota(rota){
  localStorage.setItem("rota_postos",JSON.stringify({rota}));
}

function montarTextoRota() {
  const rota = getRota();

  if (!rota.length) {
    alert("A rota está vazia.");
    return null;
  }

  let texto = "Rota do dia — UNISETER\n\n";

  rota.forEach((p, i) => {
    const nome = p["POSTOS DE SERVIÇOS / GRUPO SETER"] || "Sem nome";

    const endereco = [
      p["ENDEREÇO I"],
      p["ENDEREÇO II"],
      p["ENDEREÇO III"],
      p["ENDEREÇO IV"]
    ].filter(Boolean).join(" - ");

    texto += `${i + 1}) *${nome}*\n`;
    texto += `📍 ${endereco || "Endereço não disponível"}\n\n`;
  });

  return texto;
}
    
function desenharRota(){
  layerRota.clearLayers();
  const rota=getRota();
  if(rota.length<2) return;
  L.polyline(rota.map(p=>[p.Latitude,p.Longitude]),{color:"#0066ff",weight:4}).addTo(layerRota);
}

function flashItem(index){
  const itens = document.querySelectorAll(".rota-item");
  const el = itens[index];
  if(!el) return;

  el.classList.add("flash");
  setTimeout(()=>el.classList.remove("flash"),300);
}
function irParaMeuGps(){
  if (!navigator.geolocation) {
    alert("Seu navegador não suporta geolocalização.");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      // limpa marcador antigo do usuário (se houver)
      layerUsuario.clearLayers();

     // cria popup igual ao dos postos
const popup = `
  <div class="popup-card">
    <div class="popup-title">
      📍 Minha localização
    </div>

    <div class="popup-address">
      Localização atual do dispositivo
    </div>

    <div class="popup-actions">
      <button class="popup-btn js-add-gps">
        ➕ Incluir na rota
      </button>
    </div>
  </div>
`;

// adiciona marcador com popup
const marker = L.marker([lat, lng], { icon: iconUsuario() })
  .addTo(layerUsuario)
  .bindPopup(popup);

// ✅ registra ANTES
marker.on("popupopen", (e) => {

  const btn = e.popup.getElement().querySelector(".js-add-gps");
  if (!btn) return;

  btn.onclick = () => {

    if (navigator.vibrate) {
      navigator.vibrate(20);
    }

    const pontoUsuario = {
      Latitude: lat,
      Longitude: lng,
      "POSTOS DE SERVIÇOS / GRUPO SETER": "📍 Minha localização"
    };

    const rota = getRota();

    const existe = rota.some(r =>
      r.Latitude === lat && r.Longitude === lng
    );

    if (!existe) {
      rota.unshift(pontoUsuario);
      salvarRota(rota);
      desenharRota();
      renderRotaLista();
    }

    btn.innerHTML = "✔ Adicionado";
    btn.disabled = true;

    const el = marker.getElement();
    const ponto = el?.querySelector("div");

    if (ponto) {
      ponto.classList.add("marker-added");
      setTimeout(() => ponto.classList.remove("marker-added"), 600);
    }

    const popupEl = e.popup.getElement();

    if (popupEl) {
      popupEl.classList.add("fade-out");
      setTimeout(() => map.closePopup(e.popup), 200);
    }

    const sheet = document.getElementById("rota-sheet");
    sheet.classList.add("pulse");
    setTimeout(() => sheet.classList.remove("pulse"), 350);
  };

});

// ✅ abre DEPOIS
marker.openPopup();

       // centraliza o mapa nesse ponto
      map.setView([lat, lng], 15);

    },
    (err) => {
      alert("Não foi possível obter sua localização.");
      console.error(err);
    },
    { enableHighAccuracy: true }
  );
}


    
function renderRotaLista(){
  const lista = document.getElementById("rota-list");
  lista.innerHTML = "";

  const rota = getRota();

  atualizarContadorRota();

  let dragIndex = null;
  let touchStartY = null;

  let touchTimer = null;
  let canDrag = false;


  /* ===== AUTO-SCROLL MOBILE ===== */
  const SCROLL_EDGE = 40;   // px do topo/fundo
  const SCROLL_SPEED = 6;   // velocidade
  let scrollInterval = null;

  function startAutoScroll(direction){
    stopAutoScroll();
    scrollInterval = setInterval(() => {
      lista.scrollTop += direction * SCROLL_SPEED;
    }, 16);
  }

  function stopAutoScroll(){
    if(scrollInterval){
      clearInterval(scrollInterval);
      scrollInterval = null;
    }
  }

 rota.forEach((p, i) => {

  const div = document.createElement("div");
  div.className = "rota-item";

  /* 🔧 handle de arrasto */
  const handle = document.createElement("span");
  handle.className = "rota-handle";
  handle.textContent = "☰";

  /* texto do item */
  const label = document.createElement("span");
  label.textContent = `${i+1}. ${p["POSTOS DE SERVIÇOS / GRUPO SETER"]}`;

  /* ❌ botão remover */
  const btnRemove = document.createElement("span");
  btnRemove.className = "rota-remove";
  btnRemove.textContent = "✕";

  /* monta o item */
  div.appendChild(handle);
  div.appendChild(label);
  div.appendChild(btnRemove);

   
/* ===== REMOVER ITEM DA ROTA (COM FADE) ===== */
btnRemove.addEventListener("click", (e) => {
  e.stopPropagation(); // evita conflitos com drag

  // 1️⃣ aplica a classe de animação
  div.classList.add("removing");

  // 🔹 feedback tátil ao remover
  if (navigator.vibrate) {
    navigator.vibrate(25);
  }
  
  // 2️⃣ espera a animação terminar (250ms)
  setTimeout(() => {
  const nova = [...getRota()];   // 👈 pega a rota mais atual
  nova.splice(i, 1);

  salvarRota(nova);
  desenharRota();
  renderRotaLista();
}, 250);

});



    /* ===== DESKTOP (HTML5 DRAG) ===== */
    div.draggable = true;

    div.addEventListener("dragstart", () => {
      dragIndex = i;
    });

    div.addEventListener("dragover", e => e.preventDefault());

    div.addEventListener("drop", () => {
      if (dragIndex === null || dragIndex === i) return;

      const nova = [...rota];
      const [movido] = nova.splice(dragIndex, 1);
      nova.splice(i, 0, movido);

      salvarRota(nova);
      desenharRota();
      renderRotaLista();
      flashItem(i);
    });

    /* ===== MOBILE (TOUCH) ===== */
   div.addEventListener("touchstart", e => {
  const target = e.target;

  // Só inicia drag se tocar no handle ☰
  if (!target.classList.contains("rota-handle")) {
    dragIndex = null;
    return;
  }

  dragIndex = i;
  touchStartY = e.touches[0].clientY;
  canDrag = true; // 🔥 libera o arrasto imediatamente

  if (navigator.vibrate) navigator.vibrate(15);
}, { passive: true });


    div.addEventListener("touchmove", e => {
  const touchY = e.touches[0].clientY;
  const rect = lista.getBoundingClientRect();

  // se ainda NÃO deu 300ms, deixa o scroll NORMAL da lista
  if (!canDrag) return;

  if (touchY < rect.top + SCROLL_EDGE) {
    startAutoScroll(-1);
  } else if (touchY > rect.bottom - SCROLL_EDGE) {
    startAutoScroll(1);
  } else {
    stopAutoScroll();
  }
}, { passive: true });

 
    div.addEventListener("touchend", e => {
  clearTimeout(touchTimer);

  if (!canDrag) {
    // foi só scroll → NÃO reordena nada
    dragIndex = null;
    touchStartY = null;
    return;
  }

  if (dragIndex === null || touchStartY === null) return;

  const touchEndY = e.changedTouches[0].clientY;
  const delta = touchEndY - touchStartY;

  let alvo = i;
  if (delta > 30) alvo = i + 1;
  if (delta < -30) alvo = i - 1;

  if (alvo >= 0 && alvo < rota.length && alvo !== i) {
    const nova = [...rota];
    const [movido] = nova.splice(i, 1);
    nova.splice(alvo, 0, movido);

    salvarRota(nova);
    desenharRota();
    renderRotaLista();
    flashItem(alvo);
  }

  dragIndex = null;
  touchStartY = null;
  canDrag = false;
  stopAutoScroll();
});

    lista.appendChild(div);
  });
}

window.addRota = i => {
  const rota = getRota();
  const p = JSON.parse(localStorage.getItem("postos_cache") || "[]")[i];

  if (p) {
    rota.push(p);
    salvarRota(rota);
    desenharRota();
    renderRotaLista();
  }
};

document.getElementById("btnLimpar").onclick = () => {

  
  // 👉 limpa destaque também
  if (marcadorDestacado) {
    const el = marcadorDestacado.getElement();
    el?.querySelector("div")?.classList.remove("marker-highlight");
    marcadorDestacado = null;
  }

  localStorage.removeItem("rota_postos");

};

  /* COMPARTILHAR */
  document.getElementById("btnCompartilhar").onclick = async () => {
  const texto = montarTextoRota();
if (!texto) return;

// 👇 FECHA MENU PRIMEIRO (CORRETO)
menu.style.display = "none";

// ✅ 1. Tenta usar compartilhamento nativo
if (navigator.share) {
    try {
      await navigator.share({
        title: "Rota do dia — UNISETER",
        text: texto
      });
      return;
    } catch (err) {
      console.log("Compartilhamento cancelado ou falhou");
    }
  }

  // ✅ 2. Fallback: copiar
  try {
    await navigator.clipboard.writeText(texto);
    alert("Rota copiada! Agora você pode colar onde quiser.");
  } catch (e) {
    alert("Não foi possível compartilhar automaticamente.\n\n" + texto);
  }

};

/* 📱 HANDLE → alterna expandido ↔ minimizado */
handle.onclick = () => {

  const isMin = rotaSheet.classList.contains("minimized");

  // garante que está ativo
  rotaSheet.classList.add("active");

  if (isMin) {
    // 🔼 EXPANDE
    rotaSheet.classList.remove("minimized");
    rotaList.style.display = "block";
    renderRotaLista(); // 🔥 garante atualização
  } else {
    // 🔽 MINIMIZA
    rotaSheet.classList.add("minimized");
    rotaList.style.display = "none";
  }
};

});
    
});
