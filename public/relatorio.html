<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerar Relatório — Postos UNISETER</title>

<script async crossorigin="anonymous"
  src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
  data-clerk-publishable-key="pk_test_bHVja3ktc3RpbmtidWctODUuY2xlcmsuYWNjb3VudHMuZGV2JA">
</script>

<link rel="stylesheet" href="style.css?v=202501">

<style>
body{ display:none; }
.container{ max-width:640px; margin:auto; }

header {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px;
  margin-bottom:16px;
}

label{ font-weight:bold; display:block; margin:8px 0 4px; }
.radio-group label{ font-weight:normal; }

button{
  padding:10px 16px;
  border-radius:8px;
  cursor:pointer;
}

.primary{
  background:var(--primary);
  color:white;
  border:none;
  width:100%;
}

.secondary{
  background:transparent;
  border:1px solid var(--border);
  width:100%;
}

.hidden{ display:none; }
</style>

</head>

<body>

<script>
let usuarioRelatorio = null;

document.addEventListener("DOMContentLoaded", async ()=>{

  const c = window.Clerk;
  await c.load();

  if(!c.user) return location.href="/signin.html";

  usuarioRelatorio = {
    nome: c.user.fullName || "",
    email: c.user.primaryEmailAddress
      ? c.user.primaryEmailAddress.emailAddress
      : ""
  };

  document.body.style.display="block";

// 🔹 NOVO: se já houver seleção salva, pré-seleciona "manual"
if (localStorage.getItem("postos_selecionados")) {
  const radioManual = document.querySelector('input[name="tipo"][value="manual"]');
  if (radioManual) radioManual.checked = true;
}

atualizarEstadoBotoes();
});


function atualizarEstadoBotoes(){
  const tipo = document.querySelector("input[name=tipo]:checked").value;

  const temSelecao = !!localStorage.getItem("postos_selecionados");

  // Só desabilita se for manual E ainda não houver seleção
  document.getElementById("btnGerar").disabled =
    (tipo === "manual" && !temSelecao);


  // Mostra o botão inline abaixo de "Seleção manual"
document.getElementById("btnManualInline")
  .classList.toggle("hidden", tipo !== "manual");

// Mostra/oculta o texto de status da seleção
const status = document.getElementById("manualStatus");

if (tipo === "manual" && temSelecao) {
  status.classList.remove("hidden");
} else {
  status.classList.add("hidden");
}
}

  
</script>

<header style="
  background:#003c8d;
  color:white;
  padding:18px 16px 16px;
  border-radius:0 0 18px 18px;
  box-shadow:0 4px 12px rgba(0,0,0,.15);
">

  <!-- LINHA 1 -->
  <div style="
    text-align:center;
    font-size:20px;
    font-weight:600;
  ">
    Postos Uniseter
  </div>

  <!-- LINHA 2 -->
  <div style="
    display:flex;
    justify-content:center;
    gap:12px;
    margin-top:14px;
    flex-wrap:wrap;
  ">

    <!-- MENU -->
    <div onclick="location.href='home.html'" style="
      display:flex;
      align-items:center;
      gap:6px;
      padding:10px 14px;
      border-radius:10px;
      background:rgba(255,255,255,0.15);
      cursor:pointer;
    ">
      <img src="https://img.icons8.com/ios-filled/100/menu.png" style="width:18px;">
      Menu
    </div>

    <!-- MAPA -->
    <div onclick="location.href='mapa.html'" style="
      display:flex;
      align-items:center;
      gap:6px;
      padding:10px 14px;
      border-radius:10px;
      background:rgba(255,255,255,0.15);
      cursor:pointer;
    ">
      <img src="https://img.icons8.com/ios-filled/100/marker.png" style="width:18px;">
      Mapa
    </div>

    <!-- SAIR -->
    <div onclick="sair()" style="
  display:flex;
  align-items:center;
  gap:4px;
  font-size:12px;
  opacity:.85;
  cursor:pointer;
">
  <img src="https://img.icons8.com/ios-filled/100/exit.png" style="width:16px;">
  Sair
</div>

  </div>

</header>

<div class="content">
<div class="container">
  
<div style="
  display:flex;
  align-items:center;
  gap:10px;
  padding:14px 16px;
  font-size:18px;
  font-weight:500;
">

  <img src="https://img.icons8.com/ios-filled/100/pdf.png" style="width:22px;">
  Gerar Relatório

</div>
  
<p style="color:var(--muted)">Defina os critérios do relatório</p>

<div class="card">
  <label>Tipo de relatório</label>
  <div class="radio-group" onchange="atualizarEstadoBotoes()">

    <label>
      <input type="radio" name="tipo" value="ativos" checked>
      Postos ativos
    </label>

    <label>
      <input type="radio" name="tipo" value="todos">
      Todos os cadastros (ativos + inativos)
    </label>

    <label>
      <input type="radio" name="tipo" value="favoritos">
      Apenas favoritos
    </label>

    <label>
  <input type="radio" name="tipo" value="manual">
  Seleção manual
</label>

<button
  id="btnManualInline"
  type="button"
  class="secondary hidden"
  style="margin: 8px 0 0 24px; width: auto;"
  onclick="location.href='relatorio-selecao.html'">
  Selecionar postos
</button>

<p id="manualStatus"
   class="hidden"
   style="margin: 6px 0 0 24px; color: var(--muted); font-size: 13px;">
  ✔️ Seleção manual ativa — clique em “Gerar PDF”
</p>

    </div>
</div>

<div class="card">
  <label>Ordenação</label>

  <div class="radio-group">
    <label>
      <input type="radio" name="ordem" value="posto" checked>
      Nome do Posto
    </label>
    <label>
      <input type="radio" name="ordem" value="cidade">
      Cidade
    </label>
    <label>
      <input type="radio" name="ordem" value="zona">
      Zona
    </label>
  </div>
</div>

<div class="card">
  <button
    id="btnGerar"
    type="button"
    class="primary"
    onclick="gerar()">
    Gerar PDF
  </button>

</div>

</div>

<!-- DEPENDÊNCIAS DO PDF -->
<script src="pdfmake.min.js?v=202501"></script>
<script src="vfs_fonts.js?v=202501"></script>

<!-- PDF -->
<script src="pdf-geral.js?v=202501"></script>

<script>
function gerar(){
  gerarPDFGeral({
    tipo: document.querySelector("input[name=tipo]:checked").value,
    ordem: document.querySelector("input[name=ordem]:checked").value,
    usuario: usuarioRelatorio
  });
}
</script>
  </div>
</div>
</body>
</html>
