<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <!-- 🔥 Anti-cache -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>POSTOS UNISETER — Buscar Postos</title>

  <!-- 🔐 Clerk -->
  <script async crossorigin="anonymous"
    src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
    data-clerk-publishable-key="pk_test_bHVja3ktc3RpbmtidWctODUuY2xlcmsuYWNjb3VudHMuZGV2JA">
  </script>

  <!-- 🔐 Bloqueio de acesso -->
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const c = window.Clerk;
      await c.load();
      if (!c.user) return location.href = "/signin.html";
      document.body.style.display = "block";
    });

    async function sair() {
      const c = window.Clerk;
      await c.load();
      await c.signOut();
      location.href = "/signin.html";
    }
  </script>

  <!-- 🎨 CSS global -->
  <link rel="stylesheet" href="style.css?v=202501">

  <!-- 📄 PDFs (mantidos pois outras telas usam) -->
  <script src="pdfmake.min.js"></script>
  <script src="vfs_fonts.js"></script>
  <script src="pdf-geral.js"></script>

  <!-- 🔐 Anti-flash + UX busca -->
  <style>
    body { display: none; }

    .search-box {
      max-width: 520px;
      margin: 24px auto 0;
      position: relative;
    }

    .search-wrapper {
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      color: #666;
      pointer-events: none;
    }

    #search {
      width: 100%;
      padding: 14px 44px 14px 42px;
      font-size: 16px;
      border-radius: 12px;
      border: 2px solid #003c8d;
      outline: none;
      box-sizing: border-box;
    }

    #search:focus {
      border-color: #005edb;
      box-shadow: 0 0 0 3px rgba(0, 94, 219, 0.15);
    }

    #search::placeholder {
      color: #777;
      font-size: 15px;
    }

    .clear-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #999;
      display: none;
    }

    .clear-btn:hover {
      color: #333;
    }

    @media (max-width: 600px) {
      .search-box {
        margin-top: 16px;
      }
    }
  </style>

</head>

<body>

  <!-- ===== HEADER ===== -->
 <header style="
  background:#003c8d;
  color:white;
  padding:18px 16px 16px;
  border-radius:0 0 18px 18px;
  box-shadow:0 4px 12px rgba(0,0,0,.15);
">

  <!-- LINHA 1 -->
  <div style="
    text-align:center;
    font-size:20px;
    font-weight:600;
  ">
    Postos Uniseter
  </div>

  <!-- LINHA 2 -->
  <div style="
    display:flex;
    justify-content:center;
    gap:12px;
    margin-top:14px;
    flex-wrap:wrap;
  ">

    <!-- MENU -->
    <div onclick="location.href='home.html'" style="
      display:flex;
      align-items:center;
      gap:6px;
      padding:10px 14px;
      border-radius:10px;
      background:rgba(255,255,255,0.15);
      cursor:pointer;
    ">
      <img src="https://img.icons8.com/ios-filled/100/menu.png" style="width:18px;">
      Menu
    </div>

    <!-- MAPA -->
    <div onclick="location.href='mapa.html'" style="
      display:flex;
      align-items:center;
      gap:6px;
      padding:10px 14px;
      border-radius:10px;
      background:rgba(255,255,255,0.15);
      cursor:pointer;
    ">
      <img src="https://img.icons8.com/ios-filled/100/marker.png" style="width:18px;">
      Mapa
    </div>

    <!-- SAIR -->
    <div onclick="sair()" style="
      display:flex;
      align-items:center;
      gap:6px;
      padding:10px 14px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.4);
      cursor:pointer;
    ">
      <img src="https://img.icons8.com/ios-filled/100/exit.png" style="width:18px;">
      Sair
    </div>

  </div>

</header>

<div style="
  display:flex;
  align-items:center;
  gap:10px;
  padding:14px 16px;
  font-size:18px;
  font-weight:500;
">

  <img src="https://img.icons8.com/ios-filled/100/search.png" style="width:22px;">
  Buscar Postos

</div>

  <!-- ===== BUSCA ===== -->
  <div class="search-box">
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>

      <input
        id="search"
        type="text"
        placeholder="Buscar posto por nome, cidade ou bairro…"
        autocomplete="off"
        oninput="document.querySelector('.clear-btn').style.display = this.value ? 'block' : 'none';"
      >

      <button
        class="clear-btn"
        onclick="
          document.getElementById('search').value='';
          document.getElementById('suggestions').innerHTML='';
          document.getElementById('details').innerHTML='';
          this.style.display='none';
        ">
        ✕
      </button>
    </div>

    <div id="suggestions"></div>
  </div>

  <!-- ===== DETALHES ===== -->
  <div id="details" style="margin-top:20px;"></div>

  <!-- ⚠️ JS PRINCIPAL SEMPRE POR ÚLTIMO -->
  <script src="app.js?v=202501"></script>

</body>
</html>
