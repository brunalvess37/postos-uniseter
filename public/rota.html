<!DOCTYPE html>
<html lang="pt-BR">
<head>

<!-- 🔥 Impede cache antigo -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rota — Postos UNISETER</title>

<!-- Clerk Login -->
<script async crossorigin="anonymous"
src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
data-clerk-publishable-key="pk_test_bHVja3ktc3RpbmtidWctODUuY2xlcmsuYWNjb3VudHMuZGV2JA"></script>

<script>
document.addEventListener("DOMContentLoaded", async ()=>{
    const c = window.Clerk;
    await c.load();

    if(!c.user) return location.href="/signin.html";

    document.body.style.display = "block"; // ✅ libera tela após login
});
</script>

<link rel="stylesheet" href="style.css?v=202501">

<script>
async function sair() {
  const c = window.Clerk;
  await c.load();
  await c.signOut();
  location.href = "/signin.html";
}
</script>

<!-- Bibliotecas -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="pdfmake.min.js?v=202501"></script>
<script src="vfs_fonts.js?v=202501"></script>

<!-- Scripts da rota -->
<script src="pdf-rota.js?v=202501"></script>
<script src="rota.js?v=202501"></script>

<style>
body{
  display:none;   /* 🔐 anti-flash: esconde até validar login */
}
    
#rota-info{ margin:10px;font-size:14px;color:#333; }

#rota-lista .card{
  background:white;
  border:1px solid #e0e0e0;
  border-radius:12px;
  padding:14px;
  margin:10px 0;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}
    
#mapa{ width:100%;max-height:350px;background:#eee;margin-top:10px; }
button{ margin:4px;padding:8px 12px;font-size:14px; }
</style>

</head>
<body>

<header style="
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
">
  <h2 style="margin:0;">POSTOS UNISETER</h2>

  <div style="display:flex;gap:8px;">
    
    <button onclick="location.href='home.html'"
      style="padding:6px 10px;border-radius:6px;border:1px solid #bbb;cursor:pointer;">
      Menu
    </button>

    <button onclick="location.href='mapa.html'"
      style="padding:6px 10px;border-radius:6px;border:1px solid #bbb;cursor:pointer;">
      Mapa
    </button>

    <button onclick="sair()"
      style="padding:6px 10px;border-radius:6px;border:1px solid #bbb;cursor:pointer;">
      Sair
    </button>

  </div>
</header>

<p id="rota-info" style="margin:10px 0; color:#555;"></p>
    
<div id="rota-lista"></div>


<div style="
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin:20px 0;
  padding:12px;
  background:#fff;
  border:1px solid #e0e0e0;
  border-radius:12px;
">
  <button class="secondary" onclick="otimizarRota()">📍 Otimizar rota</button>
  <button class="secondary" onclick="limparRota()">🗑 Limpar rota</button>
  <button class="secondary" onclick="abrirNoGoogleMaps()">Rota no Google Maps</button>
  <button class="secondary" onclick="gerarPDFRota()">📄 PDF</button>
</div>


<button class="secondary" onclick="toggleMapa()">
  🗺 Mostrar / Ocultar mapa
</button>
    
<div id="mapa" style="height:0; overflow:hidden; transition:.3s"></div>

</body>
</html>
