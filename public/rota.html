<!DOCTYPE html>
<html lang="pt-BR">
<head>

<!-- 🔥 Impede cache antigo -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rota — Postos UNISETER</title>

<!-- Clerk Login -->
<script async crossorigin="anonymous"
src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
data-clerk-publishable-key="pk_test_bHVja3ktc3RpbmtidWctODUuY2xlcmsuYWNjb3VudHMuZGV2JA"></script>

<script>
document.addEventListener("DOMContentLoaded", async ()=>{
    const c = window.Clerk;
    await c.load();

    if(!c.user) return location.href="/signin.html";

    document.body.style.display = "block"; // ✅ libera tela após login
});
</script>

<link rel="stylesheet" href="style.css?v=202501">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
<script>
async function sair() {
  const c = window.Clerk;
  await c.load();
  await c.signOut();
  location.href = "/signin.html";
}
</script>

<!-- Bibliotecas -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="pdfmake.min.js?v=202501"></script>
<script src="vfs_fonts.js?v=202501"></script>

<!-- Scripts da rota -->
<script src="pdf-rota.js?v=202501"></script>
<script src="rota.js?v=202501"></script>

<style>
body{
  display:none;   /* 🔐 anti-flash: esconde até validar login */
}
    
#rota-info{ margin:10px;font-size:14px;color:#333; }

#rota-lista .card{
  background:white;
  border:1px solid #e0e0e0;
  border-radius:12px;
  padding:14px;
  margin:10px 0;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}
    
#mapa{ width:100%;max-height:350px;background:#eee;margin-top:10px; }
button{ margin:4px;padding:8px 12px;font-size:14px; }
</style>

</head>
<body>

<div class="app-header">

  <div class="app-header-title">
    Postos Uniseter
  </div>

  <div class="app-header-actions">

    <div class="app-header-menu" onclick="abrirMenu()">
      ☰
    </div>

    <div class="app-header-map" onclick="location.href='mapa.html'">
      <img src="https://img.icons8.com/ios-filled/100/marker.png">
      <span>Mapa</span>
    </div>

  </div>

</div>

<div class="page-subtitle">
  Rota do Dia
</div>
    
<p id="rota-info" style="margin:10px 0; color:#555;"></p>
    
<div id="rota-lista"></div>


<div style="
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin:20px 0;
  padding:12px;
  background:#fff;
  border:1px solid #e0e0e0;
  border-radius:12px;
">

  <!-- 🔵 PRINCIPAL -->
  <button onclick="otimizarRota()" style="
    display:flex;
    align-items:center;
    gap:6px;
    padding:10px 16px;
    border-radius:8px;
    border:none;
    background:#003c8d;
    color:#fff;
    font-weight:500;
    cursor:pointer;
  ">
    📍 Otimizar rota
  </button>

  <!-- ⚪ SECUNDÁRIOS -->
  <button onclick="abrirModalZona()" style="
    display:flex;
    align-items:center;
    gap:6px;
    padding:10px 14px;
    border-radius:8px;
    border:1px solid #ccc;
    background:#f9f9f9;
    cursor:pointer;
  ">
    ➕ Adicionar
  </button>

  <button onclick="limparRota()" style="
    display:flex;
    align-items:center;
    gap:6px;
    padding:10px 14px;
    border-radius:8px;
    border:1px solid #ccc;
    background:#f9f9f9;
    cursor:pointer;
  ">
    🗑 Limpar rota
  </button>

  <button onclick="abrirNoGoogleMaps()" style="
  display:flex;
  align-items:center;
  gap:6px;
  padding:10px 14px;
  border-radius:8px;
  border:1px solid #ccc;
  background:#f9f9f9;
  cursor:pointer;
">
  <img src="icons/google-maps.png" style="width:18px;height:18px;">
  Google Maps
</button>

  <button onclick="gerarPDFRota()" style="
    display:flex;
    align-items:center;
    gap:6px;
    padding:10px 14px;
    border-radius:8px;
    border:1px solid #ccc;
    background:#f9f9f9;
    cursor:pointer;
  ">
    📄 PDF
  </button>

  <button id="btnCompartilharRota" style="
    display:flex;
    align-items:center;
    gap:6px;
    padding:10px 14px;
    border-radius:8px;
    border:1px solid #ccc;
    background:#f9f9f9;
    cursor:pointer;
  ">
    📤 Compartilhar
  </button>

</div>

<button onclick="toggleMapa()" style="
  margin-top:10px;
  display:flex;
  align-items:center;
  gap:6px;
  padding:10px 14px;
  border-radius:8px;
  border:1px solid #ccc;
  background:#f9f9f9;
  cursor:pointer;
">
  🗺 Mostrar Mapa desta Rota
</button>

<div id="map-rota" style="
  width:100%;
  height:300px;
  margin-top:16px;
  border-radius:12px;
  border:1px solid #ddd;
  display:none;
"></div>

<div id="mapa" style="height:0; overflow:hidden; transition:.3s"></div>

<!-- ================= MODAL ZONA ================= -->
<div id="modalZona" style="
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
">

  <div style="
    background:#fff;
    border-radius:12px;
    padding:20px;
    width:90%;
    max-width:400px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
  ">

    <div style="
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:15px;
    ">
      <b>Adicionar postos à rota</b>
      <button onclick="fecharModalZona()" style="border:none;background:none;font-size:18px;cursor:pointer;">✖</button>
    </div>

    <label style="display:block;margin-bottom:6px;">Buscar posto:</label>

<div style="
  position:relative;
  margin-bottom:12px;
  width:100%;
">
  
  <input id="buscaRota" type="text" placeholder="Digite e selecione os postos..." style="
  width:100%;
  padding:10px 36px 10px 12px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:14px;
  box-sizing:border-box;
">

<!-- ✅ BOTÃO LIMPAR (AQUI) -->
<button onclick="
  document.getElementById('buscaRota').value='';
  document.getElementById('sugestoesRota').innerHTML='';
" style="
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  border:none;
  background:none;
  cursor:pointer;
  color:#999;
  font-size:14px;
  line-height:1;
  padding:0;
">
  ✕
</button>

<div id="chipsSelecionados" style="
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:8px;
"></div>
    
  <div id="sugestoesRota" style="
    position:absolute;
    width:100%;
    background:#fff;
    border:1px solid #ddd;
    border-radius:8px;
    margin-top:4px;
    max-height:200px;
    overflow:auto;
    z-index:10;
  "></div>

</div>

<hr style="margin:15px 0;">

<label style="display:block;margin-bottom:6px;">Ou adicionar por zona:</label>

<select id="selectZona" style="
  width:100%;
  padding:8px;
  border-radius:8px;
  border:1px solid #ccc;
  margin-bottom:12px;
">
  <option value="">Selecione</option>
</select>

<div id="infoZona" style="
  background:#f1f5f9;
  padding:10px;
  border-radius:8px;
  font-size:13px;
  color:#333;
  margin-bottom:15px;
"> 
  Selecione uma zona
</div>
      
    <div style="display:flex;gap:10px;">
      <button onclick="fecharModalZona()" style="flex:1;">Cancelar</button>
      <button onclick="confirmarAdicao()" style="
  flex:1;
  background:#003c8d;
  color:#fff;
  border:none;
  border-radius:8px;
">
  Adicionar selecionados
</button>
    </div>

  </div>
</div>

<script src="menu.js"></script>

</body>
</html>
